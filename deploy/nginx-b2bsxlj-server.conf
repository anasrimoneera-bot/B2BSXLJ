# b2bsxlj 服务器实际站点配置（官网 + ERP + 合集后台 三合一）
# -----------------------------------------------------------------------------
# 用途：替换 /etc/nginx/conf.d/b2bsxlj.conf
# 说明：本文件只写 80 端口的纯配置；HTTPS（443/证书/跳转）交给 certbot 自动注入。
#       域名分配：
#         b2bsxlj.com / www.b2bsxlj.com  → 官网静态站（/var/www/b2bsxlj）
#         erp.b2bsxlj.com                → 蓝鲸 ERP（127.0.0.1:5500）
#         app.b2bsxlj.com                → 合集后台（127.0.0.1:5000）
# -----------------------------------------------------------------------------

# ---- 官网（静态站） b2bsxlj.com / www.b2bsxlj.com ----
server {
    listen 80;
    server_name b2bsxlj.com www.b2bsxlj.com;

    root  /var/www/b2bsxlj;
    index index.html;
    charset utf-8;

    # 入驻申请表单后端（apply_server.py，监听 127.0.0.1:5010）
    location /api/apply {
        proxy_pass http://127.0.0.1:5010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|css|js|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    access_log /var/log/nginx/b2bsxlj.access.log;
    error_log  /var/log/nginx/b2bsxlj.error.log;
}

# ---- 蓝鲸 ERP → 127.0.0.1:5500 ----
server {
    listen 80;
    server_name erp.b2bsxlj.com;
    client_max_body_size 600m;
    location / {
        proxy_pass http://127.0.0.1:5500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }
}

# ---- 合集后台 → 127.0.0.1:5000 ----
server {
    listen 80;
    server_name app.b2bsxlj.com;
    client_max_body_size 600m;
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }
}
