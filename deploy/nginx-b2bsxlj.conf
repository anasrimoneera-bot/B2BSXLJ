# b2bsxlj 官网 Nginx 站点配置
# 路径：/etc/nginx/sites-available/b2bsxlj.conf （Debian/Ubuntu）
#   或：/etc/nginx/conf.d/b2bsxlj.conf       （CentOS/Anolis/火山引擎自带镜像）
#
# 修改 server_name 为你的域名；未备案前可先用公网 IP 直接访问。

server {
    listen      80;
    listen      [::]:80;
    server_name b2bsxlj.com www.b2bsxlj.com 101.126.155.252;   # 域名 + 公网 IP（备案完成后域名生效，IP 始终可直连）

    root  /var/www/b2bsxlj;
    index index.html;

    charset utf-8;

    # 单页/多页静态站点：找不到文件时回退到 404，不做 SPA 重写
    location / {
        try_files $uri $uri/ =404;
    }

    # 静态资源缓存（图片/CSS/JS）
    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|css|js|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # gzip 压缩
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    access_log /var/log/nginx/b2bsxlj.access.log;
    error_log  /var/log/nginx/b2bsxlj.error.log;
}

