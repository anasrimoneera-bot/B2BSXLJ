name: Deploy website to server

# 触发：main 分支上 site/ 有改动时自动部署；也可在 Actions 页手动触发
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload site to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "site"
          target: "/root/b2bsxlj-ci"
          overwrite: true

      - name: Publish and reload nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            mkdir -p /var/www/b2bsxlj
            cp -r /root/b2bsxlj-ci/site/. /var/www/b2bsxlj/
            rm -f /var/www/b2bsxlj/使用说明.txt
            chmod -R 755 /var/www/b2bsxlj
            rm -rf /root/b2bsxlj-ci
            systemctl reload nginx
            echo "✅ 官网已自动部署"
